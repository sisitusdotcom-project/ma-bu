<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presensi Guru Digital | MA Bi'rul Ulum</title>
  
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/animations.css">

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="../index.html" class="nav-brand">
        <img src="https://res.cloudinary.com/dkfcuwuas/image/upload/q_auto,f_auto/icon-mabu_yuwogg.png" alt="Logo MA Bi'rul Ulum">
        <span>MA Bi'rul Ulum</span>
      </a>
      <div class="nav-menu">
        <a href="../index.html" class="nav-link">Beranda</a>
        <a href="../profil.html" class="nav-link">Profil</a>
        <a href="../berita.html" class="nav-link">Berita</a>
        <a href="../ppdb.html" class="nav-link">PPDB</a>
        <a href="index.html" class="nav-link" style="color: var(--primary); font-weight: 700;">Sistem</a>
      </div>
    </div>
  </nav>

  <main style="padding-top: 100px; min-height: 70vh; display: flex; align-items: center; justify-content: center; background-color: var(--gray-50);">
    
    <div class="container">
      <!-- Navigasi Internal Sistem -->
      <div class="d-flex justify-center gap-2 mb-8 flex-wrap">
        <a href="index.html" class="btn btn-outline">Cek Tagihan</a>
        <a href="kelulusan.html" class="btn btn-outline">Cek Kelulusan</a>
        <a href="presensi.html" class="btn btn-primary">Presensi Guru</a>
      </div>

      <div class="card" style="max-width: 800px; margin: 0 auto; padding: 0;">
        <div style="background-color: var(--primary); color: white; padding: var(--space-6); text-align: center;">
          <i class="ph ph-qr-code text-secondary" style="font-size: 3rem; margin-bottom: var(--space-2);"></i>
          <h2 style="color: white; margin-bottom: var(--space-2);">Sistem Kehadiran Guru Digital</h2>
          <p style="margin: 0; color: var(--gray-300);">Sistem mendeteksi Masuk atau Pulang secara otomatis.</p>
        </div>
        
        <div class="grid grid-cols-2" style="padding: var(--space-6); gap: var(--space-8);">
          <!-- Kamera QR -->
          <div style="background-color: var(--gray-900); border-radius: var(--radius-xl); height: 300px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;">
            <i class="ph ph-video-camera-slash text-gray-600" style="font-size: 4rem;"></i>
            <div style="position: absolute; bottom: 10px; width: 100%; text-align: center; color: var(--gray-400); font-size: 0.8rem;">
              Menunggu akses kamera...
            </div>
            <!-- Video tag diletakkan di sini nantinya untuk QR Scanner JS murni -->
          </div>

          <!-- Informasi Realtime -->
          <div style="display: flex; flex-direction: column; justify-content: center;">
            <div style="background-color: rgba(251, 191, 36, 0.2); padding: var(--space-4); border-radius: var(--radius-md); border-left: 4px solid var(--secondary); margin-bottom: var(--space-6);">
              <p style="margin: 0; font-size: 0.875rem;"><strong>Peringatan:</strong> Hadapkan QR Code Anda ke layar sebelah kiri.</p>
            </div>

            <div id="hasil-presensi" style="text-align: center; display: none;">
              <i class="ph ph-check-circle text-primary" style="font-size: 4rem; color: #25D366;"></i>
              <h3 style="margin-top: var(--space-2); margin-bottom: 0;">Presensi Berhasil</h3>
              <p style="color: var(--gray-600); font-size: 1.2rem; margin-top: var(--space-2);" id="pesan-sapaan">Selamat bekerja.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="../assets/js/core.js"></script>
  <script src="../assets/js/api-gas.js"></script>
</body>
</html>
